allowBuilds:
  "@tailwindcss/oxide": true
  esbuild: true
  sharp: true
  unrs-resolver: true

minimumReleaseAge: 5760
minimumReleaseAgeExclude:
  - fast-uri@3.1.2
  - "astro"
  - "@astrojs/**"
  - "eslint"
  - "@eslint/*"
  - "vite"

overrides:
  fast-uri: 3.1.2
  postcss: ">=8.5.10"
  yaml: ">=2.8.3"

trustPolicy: no-downgrade
