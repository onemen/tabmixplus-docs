allowBuilds:
  "@tailwindcss/oxide": true
  esbuild: true
  sharp: true
  unrs-resolver: true

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - "astro"
  - "@astrojs/**"
  - "eslint"
  - "@eslint/*"
  - "vite"

catalog:
  eslint: ^10.5.0
  vite: ^7.3.5

overrides:
  "brace-expansion@5.0.5": ">=5.0.6"
  esbuild: ">=0.28.1"
  eslint: "catalog:"
  js-yaml: ">=4.1.2"
  yaml: ">=2.8.3"
  vite: "catalog:"
  "astro>vite": "catalog:"
  "vitefu>vite": "catalog:"
  "@tailwindcss/vite>vite": "catalog:"

trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 525600
trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1
