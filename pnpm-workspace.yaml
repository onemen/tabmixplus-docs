allowBuilds:
  "@tailwindcss/oxide": true
  esbuild: true
  sharp: true
  unrs-resolver: true

minimumReleaseAge: 5760
minimumReleaseAgeExclude:
  - "astro"
  - "@astrojs/**"
  - "eslint"
  - "@eslint/*"
  - "vite"

overrides:
  "brace-expansion@5.0.5": ">=5.0.6"
  devalue: ">=5.8.1"
  fast-uri: 3.1.2
  postcss: ">=8.5.10"
  yaml: ">=2.8.3"

trustPolicy: no-downgrade
